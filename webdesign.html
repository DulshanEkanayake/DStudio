<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Design Gallery</title>
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-surface: #171717;
            --text-primary: #ededed;
            --accent: #00f2fe;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Segoe UI', sans-serif;
            padding: 2rem 5%;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 3rem auto;
        }

        .back-btn {
            color: var(--text-primary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid #262626;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        h1 span { color: var(--accent); }

        /* Photo Gallery Grid */
        .gallery-grid {
            column-count: 3; /* 👈 පේළි කීයක් පේන්න ඕනෙද (Desktop එකේදී) */
            column-gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            background-color: var(--bg-surface);
            border: 1px solid #262626;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            margin-bottom: 1.5rem; /* පින්තූර අතර යටින් හිඩැසක් තැබීමට */
            break-inside: avoid; /* පින්තූරය මැදින් කැඩී යාම වැළැක්වීමට */
        }

        .gallery-item:hover {
            transform: scale(1.03);
            border-color: var(--accent);
        }

        .gallery-item img {
            width: 100%;
            height: auto; /* 👈 මේකෙන් පින්තූරේ ඔරිජිනල් උස අනුව auto හැඩගැසෙනවා */
            display: block;
            pointer-events: none;       /* පින්තූරය උඩ ක්ලික් කරන්න බැරි කරයි */
            user-select: none;          /* පින්තූරය සිලෙක්ට් කරන්න බැරි කරයි */
            -webkit-user-drag: none;    /* මවුස් එකෙන් ඇදගෙන යාම (drag) වළක්වයි */
        }
        @media (max-width: 768px) {
            .gallery-grid {
                column-count: 1;
            }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>Project <span>Gallery</span></h1>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <!-- පින්තූර එකතු කරන තැන -->
    <div class="gallery-grid">
        <div class="gallery-item">
            <img src="IMG-20251019-WA0004.jpg" alt="tashmika 1">
        </div>
        <div class="gallery-item">
            <img src="IMG-20251008-WA0008.jpg" alt="tashmika 2">
        </div>
        <div class="gallery-item">
            <img src="IMG-20250905-WA0002.jpg" alt="damiru 1">
        </div>
    </div>

</body>
</html>
